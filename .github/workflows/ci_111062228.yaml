name: ci_111062228

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
    ci:
      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
        matrix:
          node-version: ['22', '24']
      steps:
        - name: Checkout code
          uses: actions/checkout@v5

        - name: Setup Node.js
          uses: actions/setup-node@v5
          with:
            node-version: ${{ matrix.node-version }}
            cache: npm

        - name: Install dependencies
          run: npm ci

        # TypeScript typecheck
        - name: TypeScript typecheck
          run: npm run typecheck

        # Prettier check
        - name: Prettier check
          run: npm run format:check

        # 跑測試並輸出 JUnit 報告
        # 任一步驟非零退出，job 即標記為失敗
        - name: Run tests
          run: |
            mkdir -p reports
            npm test -- --reporter=default --reporter=junit --outputFile.junit=reports/vitest-junit.xml

        # 把測試結果顯示在 GitHub Actions 結果頁面
        # 使用現成 action 解析 JUnit XML，產生 check summary
        - name: Test Reporter
          uses: dorny/test-reporter@v3.0.0
          if: always()
          with:
            name: Vitest Report
            path: reports/vitest-junit.xml
            reporter: java-junit

        # 額外：把原始 JUnit 檔當成 artifact 上傳，方便下載
        - name: Upload test report artifact
          if: always()
          uses: actions/upload-artifact@v7
          with:
            name: test-report
            path: reports/
            if-no-files-found: error
